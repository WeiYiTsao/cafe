<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>派西夫咖啡 · 記帳系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Kaisei+Opti:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

<!-- API Client -->
<script src="api-client.js"></script>

<style>
  :root {
    --orange:      #F47920;
    --orange-dark: #D4641A;
    --orange-soft: rgba(244,121,32,0.10);
    --white:       #FFFFFF;
    --off-white:   #F8F6F3;
    --light-gray:  #F0EDEA;
    --border:      rgba(0,0,0,0.10);
    --border-soft: rgba(0,0,0,0.06);
    --ink:         #1A1410;
    --ink-mid:     #4A3F35;
    --muted:       #9A8F85;
    --red:         #C0392B;
    --green:       #27795A;
    --surface:     rgba(255,255,255,0.85);
    --shadow:      0 2px 16px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--off-white);
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--white);
    border-bottom: 3px solid var(--orange);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 62px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .nav-logo a {
    text-decoration: none;
    display: flex; flex-direction: column; line-height: 1;
  }
  .nav-logo-zh {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700; font-size: 1.15rem;
    color: var(--ink); letter-spacing: 0.05em;
  }
  .nav-logo-en {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300; font-size: 0.62rem;
    color: var(--orange); letter-spacing: 0.18em;
    margin-top: 1px;
  }
  .nav-tabs { display: flex; gap: 0; }
  .nav-tab {
    padding: 0 1.5rem; height: 62px;
    display: flex; align-items: center;
    font-size: 0.85rem; font-weight: 500;
    color: var(--muted); cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -3px;
    transition: all 0.2s; letter-spacing: 0.05em;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .nav-tab:hover { color: var(--orange); }
  .nav-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

  /* PAGES */
  .page { display: none; padding: 2rem; max-width: 880px; margin: 0 auto; position: relative; z-index: 1; }
  .page.active { display: block; }

  /* CARD */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.8rem 2rem;
    margin-bottom: 1.4rem;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem; font-weight: 600;
    color: var(--ink-mid);
    margin-bottom: 1.2rem;
    padding-bottom: 0.7rem;
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 0.5rem;
  }

  /* PAGE HEADER */
  .page-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 1.8rem;
  }
  .page-title {
    font-family: 'Kaisei Opti', serif;
    font-size: 1.6rem; color: var(--ink);
    letter-spacing: 0.02em;
  }
  .page-date { font-size: 0.85rem; color: var(--muted); }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { grid-column: 1 / -1; }

  .field { display: flex; flex-direction: column; gap: 0.35rem; }
  .field label { font-size: 0.78rem; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; }
  .field input, .field textarea, .field select {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    font-size: 0.9rem; font-family: 'Noto Sans TC', sans-serif;
    color: var(--ink);
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .field input:focus, .field textarea:focus {
    outline: none;
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(244,121,32,0.10);
  }
  .field textarea { resize: vertical; min-height: 72px; }

  /* PURCHASE ROW */
  .purchase-row {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1.5fr auto;
    gap: 0.5rem; align-items: end; margin-bottom: 0.6rem;
  }
  .purchase-row label { font-size: 0.72rem; color: var(--muted); }
  .btn-icon {
    background: none; border: none; cursor: pointer;
    font-size: 1.1rem; padding: 0.5rem; color: var(--muted);
    border-radius: 6px; transition: all 0.15s; line-height: 1;
    height: 36px; display: flex; align-items: center;
  }
  .btn-icon:hover { background: rgba(192,57,43,0.08); color: var(--red); }
  .btn-add {
    background: none; border: 1px dashed rgba(0,0,0,0.15);
    border-radius: 8px; padding: 0.5rem 1rem;
    font-size: 0.8rem; color: var(--muted); cursor: pointer;
    width: 100%; margin-top: 0.3rem;
    transition: all 0.15s; font-family: 'Noto Sans TC', sans-serif;
  }
  .btn-add:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-soft); }

  /* SUBMIT */
  .btn-submit {
    background: var(--orange);
    color: var(--white);
    border: none; border-radius: 10px;
    padding: 0.9rem 2.5rem;
    font-size: 0.95rem; font-family: 'Noto Serif TC', serif;
    font-weight: 600; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.2s;
    width: 100%; margin-top: 0.5rem;
  }
  .btn-submit:hover { background: var(--orange-dark); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(244,121,32,0.3); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* STATUS */
  .status-msg {
    padding: 0.8rem 1rem; border-radius: 8px;
    font-size: 0.85rem; margin-top: 0.8rem; display: none;
  }
  .status-msg.success { background: rgba(39,121,90,0.08); color: var(--green); border: 1px solid rgba(39,121,90,0.2); }
  .status-msg.error   { background: rgba(192,57,43,0.08); color: var(--red); border: 1px solid rgba(192,57,43,0.2); }

  /* ADMIN TOOLBAR */
  .admin-toolbar {
    display: flex; gap: 0.8rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .admin-toolbar input[type="date"],
  .admin-toolbar input[type="month"] {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.55rem 0.8rem;
    font-size: 0.85rem; font-family: 'Noto Sans TC', sans-serif;
    color: var(--ink); cursor: pointer;
  }
  .btn-secondary {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.55rem 1rem;
    font-size: 0.82rem; color: var(--ink-mid); cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-secondary:hover { border-color: var(--orange); color: var(--orange); }
  .btn-danger {
    background: none; border: 1px solid rgba(192,57,43,0.25);
    border-radius: 6px; padding: 0.3rem 0.7rem;
    font-size: 0.78rem; color: var(--red); cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s;
  }
  .btn-danger:hover { background: rgba(192,57,43,0.06); }
  .btn-edit {
    background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 0.3rem 0.7rem;
    font-size: 0.78rem; color: var(--ink-mid); cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s;
  }
  .btn-edit:hover { border-color: var(--orange); color: var(--orange); }
  .btn-save {
    background: var(--green); border: none;
    border-radius: 6px; padding: 0.3rem 0.7rem;
    font-size: 0.78rem; color: white; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s;
  }

  /* STATS */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem;
  }
  .stat-box {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.2rem;
    text-align: center; box-shadow: var(--shadow);
  }
  .stat-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.3rem; }
  .stat-value { font-family: 'Kaisei Opti', serif; font-size: 1.4rem; color: var(--orange); }

  /* RECORD CARD */
  .record-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 1.4rem 1.6rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
  }
  .record-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.10); }
  .record-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1rem; padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--border-soft);
  }
  .record-date { font-family: 'Kaisei Opti', serif; font-size: 1.05rem; color: var(--ink); }
  .record-revenue { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; font-weight: 600; color: var(--orange); }
  .record-actions { display: flex; gap: 0.5rem; }
  .record-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.6rem; margin-bottom: 0.5rem;
  }
  .record-item-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.1rem; }
  .record-item-value { font-size: 0.9rem; color: var(--ink); font-weight: 500; }

  .photo-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.3rem; }
  .record-note {
    font-size: 0.82rem; color: var(--muted);
    background: var(--orange-soft); border-radius: 6px;
    padding: 0.5rem 0.7rem; margin-top: 0.6rem;
    border-left: 2px solid var(--orange);
  }

  /* TABLE */
  .purchase-table { width: 100%; border-collapse: collapse; margin-top: 0.4rem; }
  .purchase-table th {
    font-size: 0.72rem; color: var(--muted); text-align: left;
    padding: 0.3rem 0.5rem; border-bottom: 1px solid var(--border); font-weight: 500;
  }
  .purchase-table td {
    font-size: 0.84rem; padding: 0.35rem 0.5rem;
    border-bottom: 1px solid var(--border-soft);
  }

  /* EMPTY / LOADING */
  .empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
  .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.85rem; }

  /* NEW RECORD FORM */
  .new-record-form {
    border: 1px dashed rgba(0,0,0,0.15); border-radius: 12px;
    padding: 1.4rem; margin-bottom: 1rem; display: none;
    background: var(--light-gray);
  }
  .new-record-form.show { display: block; }

  .edit-section-label {
    font-size: 0.72rem; font-weight: 500; color: var(--muted);
    margin-bottom: 0.8rem; letter-spacing: 0.06em;
  }

  @media (max-width: 600px) {
    .page { padding: 1rem; }
    .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .record-grid { grid-template-columns: 1fr 1fr; }
    .purchase-row { grid-template-columns: 1fr 1fr 1fr; }
    .purchase-row .purchase-unit, .purchase-row .purchase-supplier { display: none; }
    .nav-logo img { height: 30px; }
    .nav-tab { padding: 0 1rem; font-size: 0.78rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">
    <a href="https://passive.iqrator.com" target="_blank">
      <div class="nav-logo-zh">派西夫</div>
      <div class="nav-logo-en">passive cafe</div>
    </a>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('cashier')">店長記帳</button>
    <button class="nav-tab" onclick="promptPassword()">營運後台</button>
  </div>
</nav>

<!-- PASSWORD MODAL -->
<div id="pw-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;">
  <div style="background:var(--white);border-radius:14px;padding:2.2rem 2.5rem;width:320px;box-shadow:0 12px 48px rgba(0,0,0,0.2);text-align:center;">
    <div style="margin-bottom:1.4rem;">
      <div style="font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:1.3rem;color:var(--ink);letter-spacing:0.05em;">派西夫</div>
      <div style="font-family:'Noto Sans TC',sans-serif;font-weight:300;font-size:0.7rem;color:var(--orange);letter-spacing:0.2em;margin-top:2px;">passive cafe</div>
    </div>
    <div style="font-size:0.82rem;color:var(--muted);margin-bottom:1.2rem;letter-spacing:0.04em;">請輸入營運後台密碼</div>
    <input type="password" id="pw-input" placeholder="密碼"
      style="width:100%;padding:0.7rem 1rem;border:1px solid var(--border);border-radius:8px;font-size:1rem;font-family:'Noto Sans TC',sans-serif;margin-bottom:0.8rem;background:var(--white);color:var(--ink);"
      onkeydown="if(event.key==='Enter')checkPassword()">
    <div id="pw-error" style="font-size:0.78rem;color:var(--red);margin-bottom:0.6rem;display:none;">密碼錯誤，請再試一次</div>
    <div style="display:flex;gap:0.6rem;">
      <button onclick="checkPassword()" style="flex:1;background:var(--orange);color:white;border:none;border-radius:8px;padding:0.7rem;font-size:0.9rem;font-family:'Noto Serif TC',serif;font-weight:600;cursor:pointer;">進入</button>
      <button onclick="closePwModal()" style="flex:1;background:none;border:1px solid var(--border);border-radius:8px;padding:0.7rem;font-size:0.9rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;color:var(--muted);">取消</button>
    </div>
  </div>
</div>

<!-- ============================= -->
<!-- CASHIER PAGE                  -->
<!-- ============================= -->
<div class="page active" id="page-cashier">
  <div class="page-header">
    <div class="page-title">今日記帳</div>
    <div class="page-date" id="cashier-date"></div>
  </div>

  <!-- 日期 -->
  <div class="card">
    <div class="card-title"><span class="icon">📅</span>記帳日期</div>
    <div class="field">
      <input type="date" id="record-date">
    </div>
  </div>

  <!-- 營收 -->
  <div class="card">
    <div class="card-title"><span class="icon">💰</span>今日營收</div>

    <!-- 營收總額 -->
    <div class="field" style="margin-bottom:1rem">
      <label>營收總額（元）</label>
      <input type="number" id="rev-total" placeholder="0">
    </div>

    <!-- 悠遊卡 -->
    <div style="border:1px solid rgba(0,0,0,0.10);border-radius:10px;padding:0.9rem 1rem;margin-bottom:0.8rem;background:rgba(0,0,0,0.02);">
      <div style="font-size:0.72rem;font-weight:600;color:var(--muted);letter-spacing:0.08em;margin-bottom:0.6rem;">🔵 悠遊卡</div>
      <div class="form-grid">
        <div class="field">
          <label>悠遊卡（元）</label>
          <input type="number" id="rev-easycard" placeholder="0">
        </div>
        <div class="field">
          <label>悠遊卡筆數</label>
          <input type="number" id="rev-easycard-count" placeholder="0">
        </div>
      </div>
    </div>

    <!-- 街口 -->
    <div style="border:1px solid rgba(0,0,0,0.10);border-radius:10px;padding:0.9rem 1rem;margin-bottom:0.8rem;background:rgba(0,0,0,0.02);">
      <div style="font-size:0.72rem;font-weight:600;color:var(--muted);letter-spacing:0.08em;margin-bottom:0.6rem;">🟡 街口支付</div>
      <div class="form-grid">
        <div class="field">
          <label>街口支付（元）</label>
          <input type="number" id="rev-jkopay" placeholder="0">
        </div>
        <div class="field">
          <label>街口筆數</label>
          <input type="number" id="rev-jkopay-count" placeholder="0">
        </div>
      </div>
    </div>

    <!-- FoodPanda -->
    <div class="field" style="margin-bottom:0.8rem">
      <label>🐼 FoodPanda（元）</label>
      <input type="number" id="rev-panda" placeholder="0">
    </div>

    <!-- 現金 -->
    <div style="border:1px solid rgba(0,0,0,0.10);border-radius:10px;padding:0.9rem 1rem;background:rgba(0,0,0,0.02);">
      <div style="font-size:0.72rem;font-weight:600;color:var(--muted);letter-spacing:0.08em;margin-bottom:0.6rem;">💵 現金</div>
      <div class="form-grid cols-3">
        <div class="field">
          <label>現金收入（元）</label>
          <input type="number" id="rev-cash" placeholder="0">
        </div>
        <div class="field">
          <label>實收現金（元）</label>
          <input type="number" id="rev-cash-actual" placeholder="0">
        </div>
        <div class="field">
          <label>溢收（元）</label>
          <input type="number" id="rev-overflow" placeholder="0">
        </div>
      </div>
    </div>
  </div>

  <!-- 儲值寄杯 -->
  <div class="card">
    <div class="card-title"><span class="icon">🏷️</span>儲值 / 寄杯</div>
    <div class="form-grid" style="margin-bottom:0.8rem">
      <div class="field">
        <label>寄杯使用點數</label>
        <input type="number" id="store-used" placeholder="0">
      </div>
      <div class="field">
        <label>儲值金額</label>
        <input type="number" id="store-value" placeholder="0">
      </div>
    </div>
    <div class="form-grid">
      <div class="field">
        <label>出杯數</label>
        <input type="number" id="store-cups" placeholder="0">
      </div>
      <div class="field">
        <label>出餐數</label>
        <input type="number" id="store-meals" placeholder="0">
      </div>
    </div>
  </div>

  <!-- 存款 -->
  <div class="card">
    <div class="card-title"><span class="icon">🏦</span>存款 / 零用金</div>
    <div class="form-grid cols-3" style="margin-bottom:1rem">
      <div class="field">
        <label>實收現金（元）</label>
        <input type="number" id="cash-actual-display" placeholder="自動帶入" style="background:rgba(244,121,32,0.06);color:var(--orange);font-weight:500;" readonly>
      </div>
      <div class="field">
        <label>今日零用金收入（元）</label>
        <input type="number" id="petty-income" placeholder="0" oninput="autoCalcFinance()">
      </div>
      <div class="field">
        <label>今日存款</label>
        <input type="number" id="deposit" placeholder="自動計算" style="background:rgba(244,121,32,0.06);color:var(--orange);font-weight:500;" readonly>
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>零用金餘額（自動）</label>
        <input type="number" id="petty-cash" placeholder="自動計算" style="background:rgba(244,121,32,0.06);color:var(--orange);font-weight:500;" readonly>
      </div>
    </div>

    <!-- 支出區塊：顯眼警示 -->
    <div style="border:2px solid rgba(192,57,43,0.35);border-radius:10px;padding:1rem 1.2rem;background:rgba(192,57,43,0.04);">
      <div class="form-grid">
        <div class="field">
          <label style="color:#C0392B;font-weight:600;">🟠 派西夫支出（元）</label>
          <input type="number" id="expense-passive" placeholder="0" oninput="autoCalcFinance()">
        </div>
        <div class="field">
          <label style="color:#C0392B;font-weight:600;">⬛ 智域支出（元）</label>
          <input type="number" id="expense-iqrator" placeholder="0">
        </div>
      </div>
    </div>

    <div style="font-size:0.75rem;color:var(--muted);margin-top:0.6rem;padding:0.5rem 0.7rem;background:var(--light-gray);border-radius:6px;">
      💡 零用金餘額 ＝ 前日餘額 + 今日零用金收入 − 今日派西夫支出<br>
      💡 今日存款 ＝ 實收現金 − 今日零用金收入
    </div>
  </div>

  <!-- 進貨 -->
  <div class="card">
    <div class="card-title"><span class="icon">📦</span>今日進貨</div>
    <div id="purchase-list">
      <!-- rows injected by JS -->
    </div>
    <button class="btn-add" onclick="addPurchaseRow()">＋ 新增進貨項目</button>
  </div>

  <!-- 庫存 -->
  <div class="card">
    <div class="card-title"><span class="icon">🗄️</span>庫存記錄</div>
    <div id="inventory-list"></div>
    <button class="btn-add" onclick="addInventoryRow()">＋ 新增庫存項目</button>
  </div>

  <!-- 備註 -->

<script>
// =================== PAGE SWITCH ===================
const ADMIN_PASSWORD = 'passive2026';

function switchPage(name) {

function promptPassword() {

// =================== EXPORT ===================
function recordToCSVRows(r) {
  const pos = r.pos || {};
  const rec = r.record || {};
  const rows = [];
  rows.push([
    r.date,
    pos.revenue||0, pos.easycard||0, pos.easycardCount||0,
    pos.jkopay||0, pos.jkopayCount||0, pos.panda||0, pos.linepay||0,
    pos.memberPoints||0, pos.cash||0,
    rec.cashActual||0, rec.overflow||0,
    pos.cups||0, pos.meals||0,
    rec.storeUsed||0, rec.storeValue||0,
    rec.deposit||0, rec.expensePassive||0, rec.expenseIqrator||0,
    rec.pettyCash||0, rec.notes||''
  ].map(v => `"${v}"`).join(','));
  (r.purchases||[]).forEach(p => {
    rows.push(['','','','','','','','','','','','','','','','','','',
      `"${p.item||''}"`,`"${p.price||''}"`,`"${p.qty||''}"`,`"${p.amount||''}"`,`"${p.supplier||''}"`
    ].join(','));
  });
  return rows.join('\n');
}
function downloadCSV(content, filename) {
  const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}
function buildCSV(records) {
  const header = [
    '日期','營收總額','悠遊卡','悠遊卡筆數','街口','街口筆數','FoodPanda','LINE Pay',
    '會員點數','現金收入','實收現金','溢收','出杯數','出餐數',
    '寄杯點數','儲值金額','存款','派西夫支出','智域支出','零用金餘額','備註',
    '進貨品項','單價','數量','金額','廠商'
  ].map(h=>`"${h}"`).join(',');
  return header + '\n' + records.map(r => recordToCSVRows(r)).join('\n');
}
function exportSingleDay() {
  const date = document.getElementById('export-single-date').value;
  if (!date) { alert('請先選擇要匯出的日期'); return; }
  const records = allRecords.filter(r => r.date === date);
  if (!records.length) { alert(`${formatDate(date)} 沒有記帳資料`); return; }
  downloadCSV(buildCSV(records), `派西夫咖啡_${date}.csv`);
}
function exportMonth() {
  const year = document.getElementById('filter-year').value;
  const month = document.getElementById('filter-month-select').value;
  if (!year || !month) { alert('請先選擇年份和月份'); return; }
  const prefix = `${year}-${month}`;
  const records = allRecords.filter(r => r.date && r.date.startsWith(prefix));
  if (!records.length) { alert(`${year} 年 ${parseInt(month)} 月 沒有記帳資料`); return; }
  downloadCSV(buildCSV([...records].sort((a,b) => a.date.localeCompare(b.date))), `派西夫咖啡_${prefix}.csv`);
}

function todayStr() { return new Date().toISOString().split('T')[0]; }
function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日`;
}

document.getElementById('admin-date').textContent = new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'long'});

// =================== PURCHASE ROWS ===================
let purchaseCount = 0;
function addPurchaseRow(data={}) {
  purchaseCount++;
  const id = purchaseCount;
  const row = document.createElement('div');
  row.className = 'purchase-row'; row.id = 'pur-' + id;
  row.style.gridTemplateColumns = '2fr 1fr 1fr 1fr 1.2fr 1fr auto';
  row.innerHTML = `
    <div class="field"><label>品項</label><input type="text" id="pur-item-${id}" value="${data.item||''}" placeholder="品項名稱"></div>
    <div class="field"><label>單價</label><input type="number" id="pur-price-${id}" value="${data.price||''}" placeholder="0" oninput="calcAmount(${id})"></div>
    <div class="field"><label>數量</label><input type="number" id="pur-qty-${id}" value="${data.qty||''}" placeholder="0" oninput="calcAmount(${id})"></div>
    <div class="field"><label>金額（自動）</label><input type="number" id="pur-amt-${id}" value="${data.amount||''}" placeholder="0" style="background:rgba(244,121,32,0.06);color:var(--orange);font-weight:500;" readonly></div>
    <div class="field purchase-supplier"><label>廠商</label><input type="text" id="pur-sup-${id}" value="${data.supplier||''}" placeholder="廠商"></div>
    <div class="field"><label>歸屬</label>
      <select id="pur-owner-${id}" style="background:var(--white);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.5rem;font-size:0.85rem;font-family:'Noto Sans TC',sans-serif;color:var(--ink);">
        <option value="派西夫" ${(data.owner||'派西夫')==='派西夫'?'selected':''}>派西夫</option>
        <option value="智域" ${data.owner==='智域'?'selected':''}>智域</option>
      </select>
    </div>
    <button class="btn-icon" onclick="removePurchaseRow(${id})">✕</button>`;
  document.getElementById('purchase-list').appendChild(row);
}
function calcAmount(id) {
  const price = parseFloat(document.getElementById('pur-price-'+id)?.value)||0;
  const qty   = parseFloat(document.getElementById('pur-qty-'+id)?.value)||0;
  const amt   = document.getElementById('pur-amt-'+id);
  if (amt) amt.value = price&&qty ? price*qty : '';
}
function removePurchaseRow(id) { document.getElementById('pur-'+id)?.remove(); }
function getPurchaseData() {
  return Array.from(document.querySelectorAll('[id^="pur-"]')).map(r => {
    const id = r.id.replace('pur-','');
    return { item: document.getElementById('pur-item-'+id)?.value||'',
             price: parseFloat(document.getElementById('pur-price-'+id)?.value)||0,
             qty:   parseFloat(document.getElementById('pur-qty-'+id)?.value)||0,
             amount: parseFloat(document.getElementById('pur-amt-'+id)?.value)||0,
             supplier: document.getElementById('pur-sup-'+id)?.value||'',
             owner: document.getElementById('pur-owner-'+id)?.value||'派西夫' };
  }).filter(r => r.item);
}

function getInventoryData() {

             item: document.getElementById('inv-item-'+id)?.value||'',
             qty:  document.getElementById('inv-qty-'+id)?.value||'',

// =================== AUTO CALC FINANCE ===================
let prevPettyCash = 0;
async function loadPrevPettyCash() {
  try {
    const today = document.getElementById('record-date').value;
    if (!today) return;
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.toISOString().split('T')[0];
    const res = await API.daily(yStr);
    if (res.isSuccess && res.data?.record) {
      prevPettyCash = res.data.record.pettyCash || 0;
    }
    autoCalcFinance();
  } catch(e) {}
}

function autoCalcFinance() {
  const cashActual   = parseFloat(document.getElementById('rev-cash-actual')?.value)||0;
  const pettyIncome  = parseFloat(document.getElementById('petty-income')?.value)||0;
  const passiveExp   = parseFloat(document.getElementById('expense-passive')?.value)||0;
  const display = document.getElementById('cash-actual-display');
  if (display) display.value = cashActual||'';
  document.getElementById('deposit').value   = Math.max(0, cashActual - pettyIncome);
  document.getElementById('petty-cash').value = prevPettyCash + pettyIncome - passiveExp;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('rev-cash-actual')?.addEventListener('input', autoCalcFinance);
  document.getElementById('record-date')?.addEventListener('change', () => {
    loadPrevPettyCash();
    checkPosImport();
  });
  loadPrevPettyCash();
  checkPosImport();
});

// =================== POS 匯入狀態 ===================
const POS_LOCKED_FIELDS = [
  'rev-total','rev-easycard','rev-easycard-count',
  'rev-jkopay','rev-jkopay-count','rev-panda',
  'rev-linepay','rev-linepay-count',
  'rev-member-points','rev-member-points-count',
  'rev-cash','store-cups','store-meals'
];

async function checkPosImport() {
  const date = document.getElementById('record-date').value;
  if (!date) return;
  try {
    const res = await API.daily(date);
    if (res.isSuccess && res.data) {
      const d = res.data;
      if (d.pos && d.pos.ticketCount > 0) {
        applyPosData(d.pos);
        lockPosFields(true);
        showPosBanner(true);
      } else {
        lockPosFields(false);
        showPosBanner(false);
      }
      if (d.hasRecord && d.record) applyRecordData(d.record);
      if (d.purchases?.length)   populatePurchases(d.purchases);
      if (d.inventories?.length) populateInventories(d.inventories);
    }
  } catch(e) {}
}

function applyPosData(pos) {
  const set = (id, val) => { const el=document.getElementById(id); if(el) el.value=val??''; };
  set('rev-total',               pos.revenue);
  set('rev-easycard',            pos.easycard);
  set('rev-easycard-count',      pos.easycardCount);
  set('rev-jkopay',              pos.jkopay);
  set('rev-jkopay-count',        pos.jkopayCount);
  set('rev-panda',               pos.panda);
  set('rev-linepay',             pos.linepay);
  set('rev-linepay-count',       pos.linepayCount);
  set('rev-member-points',       pos.memberPoints);
  set('rev-member-points-count', pos.memberPointsCount);
  set('rev-cash',                pos.cash);
  set('store-cups',              pos.cups);
  set('store-meals',             pos.meals);
  autoCalcFinance();
}

function applyRecordData(rec) {
  const set = (id, val) => { const el=document.getElementById(id); if(el&&val!==undefined) el.value=val; };
  set('rev-cash-actual',  rec.cashActual);
  set('rev-overflow',     rec.overflow);
  set('store-used',       rec.storeUsed);
  set('store-value',      rec.storeValue);
  set('petty-income',     rec.pettyIncome);
  set('expense-passive',  rec.expensePassive);
  set('expense-iqrator',  rec.expenseIqrator);
  set('notes',            rec.notes);
  autoCalcFinance();
}

function populatePurchases(purchases) {
  document.getElementById('purchase-list').innerHTML = '';
  purchaseCount = 0;
  purchases.forEach(p => addPurchaseRow(p));
}
function populateInventories(inventories) {
  document.getElementById('inventory-list').innerHTML = '';
  inventoryCount = 0;
  inventories.forEach(iv => addInventoryRow(iv));
}

function lockPosFields(lock) {
  POS_LOCKED_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.readOnly = lock;
    el.style.background = lock ? 'rgba(39,121,90,0.06)' : '';
    el.style.color = lock ? 'var(--green)' : '';
  });
}

function showPosBanner(show) {
  const banner  = document.getElementById('pos-import-banner');
  const pending = document.getElementById('pos-pending-banner');
  if (banner)  banner.style.display  = show ? 'flex' : 'none';
  if (pending) pending.style.display = show ? 'none' : 'flex';
}

// =================== SUBMIT ===================
async function submitRecord() {
  const btn    = document.getElementById('submit-btn');
  const status = document.getElementById('submit-status');
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    const date = document.getElementById('record-date').value;
    const record = {
      cashActual:     num('rev-cash-actual'),
      overflow:       num('rev-overflow'),
      storeUsed:      num('store-used'),
      storeValue:     num('store-value'),
      pettyIncome:    num('petty-income'),
      expensePassive: num('expense-passive'),
      expenseIqrator: num('expense-iqrator'),
      expense:        num('expense-passive') + num('expense-iqrator'),
      deposit:        num('deposit'),
      pettyCash:      num('petty-cash'),
      notes:          document.getElementById('notes').value,
    };
    const res = await API.saveRecord(date, record, getPurchaseData(), getInventoryData());
    if (res.isSuccess) {
      showStatus(status, '✅ 今日帳目已儲存！', 'success');
      btn.textContent = '✅ 已儲存';
    } else { throw new Error(res.message); }
  } catch(e) {
    showStatus(status, '❌ 儲存失敗：' + e.message, 'error');
    btn.disabled = false; btn.textContent = '儲存今日帳目';
  }
}

function num(id) { return parseFloat(document.getElementById(id)?.value)||0; }
function showStatus(el, msg, type) {
  el.textContent = msg; el.className = 'status-msg ' + type; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

// =================== ADMIN LOAD ===================
let allRecords = [];
let editingId  = null;

// 載入指定月份的資料（year-month: "2026-05"）
// 若沒帶參數，預設載入當月
async function loadRecords(yearMonth) {
  const container = document.getElementById('records-container');
  container.innerHTML = '<div class="loading">載入中…</div>';

  // 預設當月
  if (!yearMonth) {
    const now = new Date();
    yearMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  }

  try {
    // 一次撈整月所有資料（POS + 手動記帳 + 進貨 + 庫存）
    const res = await fetch(`http://127.0.0.1:5000/api/month-detail?month=${yearMonth}`)
      .then(r => r.json())
      .catch(() => ({ isSuccess: false, message: '網路連線失敗' }));

    if (!res.isSuccess) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>${res.message||'載入失敗'}</p></div>`;
      return;
    }

    allRecords = (res.data.days || [])
      .filter(d => d.hasRecord || d.pos?.ticketCount > 0)
      .sort((a, b) => b.date.localeCompare(a.date));

    // 設定篩選器（固定年份選單）並渲染
    buildYearOptions();
    setFilterToMonth(yearMonth);
    renderRecords(allRecords);
    updateStats(allRecords);
  } catch(e) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>${e.message}</p></div>`;
  }
}

// 固定年份選單（不依賴資料），預設顯示近 3 年
function buildYearOptions() {
  const sel = document.getElementById('filter-year');
  if (sel.options.length > 1) return; // 已建立過就不重建
  const thisYear = new Date().getFullYear();
  sel.innerHTML = '<option value="">全部年份</option>';
  for (let y = thisYear; y >= thisYear - 2; y--) {
    const opt = document.createElement('option');
    opt.value = String(y);
    opt.textContent = y + ' 年';
    sel.appendChild(opt);
  }
}

// 把篩選器設定為指定月份（不觸發 API）
function setFilterToMonth(yearMonth) {
  const [y, m] = yearMonth.split('-');
  document.getElementById('filter-year').value = y;
  document.getElementById('filter-month-select').value = m;
}

// 篩選器變動時觸發：重新呼叫 API 撈該月資料
function filterByMonth() {
  const year  = document.getElementById('filter-year').value;
  const month = document.getElementById('filter-month-select').value;
  if (!year || !month) return; // 年或月任一沒選就不動作
  loadRecords(`${year}-${month}`);
}

// 清除篩選 → 回到當月
function clearFilter() {
  loadRecords();
}

// 預設當月（保留函式名以維持相容性）
function setDefaultMonthFilter() {
  const now = new Date();
  const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  loadRecords(ym);
}

function updateStats(records) {
  const rev        = records.reduce((s,r) => s+(r.pos?.revenue||0), 0);
  const dep        = records.reduce((s,r) => s+(r.record?.deposit||0), 0);
  const expPassive = records.reduce((s,r) => s+(r.record?.expensePassive||0), 0);
  const expIqrator = records.reduce((s,r) => s+(r.record?.expenseIqrator||0), 0);
  const cups       = records.reduce((s,r) => s+(r.pos?.cups||0), 0);
  const meals      = records.reduce((s,r) => s+(r.pos?.meals||0), 0);
  document.getElementById('stat-revenue').textContent    = '$'+rev.toLocaleString();
  document.getElementById('stat-deposit').textContent    = '$'+dep.toLocaleString();
  document.getElementById('stat-expense').textContent    = '$'+expPassive.toLocaleString();
  document.getElementById('stat-expense-iq').textContent = '$'+expIqrator.toLocaleString();
  document.getElementById('stat-days').textContent       = records.length+' 天';
  document.getElementById('stat-cups').textContent       = cups.toLocaleString();
  document.getElementById('stat-meals').textContent      = meals.toLocaleString();
}

function renderRecords(records) {
  const container = document.getElementById('records-container');
  if (!records.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>尚無記帳資料</p></div>';
    return;
  }
  container.innerHTML = records.map(r => renderRecord(r)).join('');
}

    : `<div class="record-actions">

        <button class="btn-danger" onclick="deleteRecord('${r.date}')">刪除</button>

  return `
  <div class="record-card" id="card-${r.date}">
    <div class="record-header">

        <div class="record-revenue">$${(pos.revenue||0).toLocaleString()}</div>
        ${actionsHtml}
      </div>
    </div>
    ${!isEditing ? `
    <div class="record-grid">
      <div class="record-item"><div class="record-item-label">悠遊卡</div><div class="record-item-value">${pos.easycard?'$'+Number(pos.easycard).toLocaleString():'—'}</div></div>
      <div class="record-item"><div class="record-item-label">街口支付</div><div class="record-item-value">${pos.jkopay?'$'+Number(pos.jkopay).toLocaleString():'—'}</div></div>
      <div class="record-item"><div class="record-item-label">LINE Pay</div><div class="record-item-value">${pos.linepay?'$'+Number(pos.linepay).toLocaleString():'—'}</div></div>
      <div class="record-item"><div class="record-item-label">FoodPanda</div><div class="record-item-value">${pos.panda?'$'+Number(pos.panda).toLocaleString():'—'}</div></div>
      <div class="record-item"><div class="record-item-label">現金收入</div><div class="record-item-value">${pos.cash?'$'+Number(pos.cash).toLocaleString():'—'}</div></div>
      <div class="record-item"><div class="record-item-label">實收現金</div><div class="record-item-value">${rec.cashActual?'$'+Number(rec.cashActual).toLocaleString():'—'}</div></div>
      <div class="record-item" style="border-left:2px solid var(--orange);padding-left:0.5rem">
        <div class="record-item-label">☕ 出杯數</div>
        <div class="record-item-value" style="color:var(--orange);font-size:1.1rem;font-weight:600;">${pos.cups||'—'}</div>
      </div>
      <div class="record-item" style="border-left:2px solid var(--ink);padding-left:0.5rem">
        <div class="record-item-label">🍽️ 出餐數</div>
        <div class="record-item-value" style="font-size:1.1rem;font-weight:600;">${pos.meals||'—'}</div>
      </div>
      <div class="record-item"><div class="record-item-label">存款</div><div class="record-item-value">${rec.deposit?'$'+Number(rec.deposit).toLocaleString():'—'}</div></div>
      <div class="record-item" style="border-left:2px solid var(--orange);padding-left:0.5rem">
        <div class="record-item-label">派西夫支出</div>
        <div class="record-item-value" style="color:var(--orange)">${rec.expensePassive?'$'+Number(rec.expensePassive).toLocaleString():'—'}</div>
      </div>
      <div class="record-item" style="border-left:2px solid var(--ink-mid);padding-left:0.5rem">
        <div class="record-item-label">智域支出</div>
        <div class="record-item-value">${rec.expenseIqrator?'$'+Number(rec.expenseIqrator).toLocaleString():'—'}</div>
      </div>
      <div class="record-item"><div class="record-item-label">零用金餘額</div><div class="record-item-value">${rec.pettyCash?'$'+Number(rec.pettyCash).toLocaleString():'—'}</div></div>

// Edit helpers
function eCalcAmt(rid,i){
  const price=parseFloat(document.getElementById(`epur-price-${rid}-${i}`)?.value)||0;
  const qty=parseFloat(document.getElementById(`epur-qty-${rid}-${i}`)?.value)||0;
  const amt=document.getElementById(`epur-amt-${rid}-${i}`);
  if(amt) amt.value=price&&qty?price*qty:'';
}
function eAddPur(rid){
  const list=document.getElementById(`epur-list-${rid}`);
  const i=list.children.length;
  const div=document.createElement('div');
  div.className='purchase-row'; div.id=`epur-row-${rid}-${i}`;
  div.style.gridTemplateColumns='2fr 1fr 1fr 1fr 1.2fr 1fr auto';
  div.innerHTML=`
    <div class="field"><label>品項</label><input type="text" id="epur-item-${rid}-${i}"></div>
    <div class="field"><label>單價</label><input type="number" id="epur-price-${rid}-${i}" oninput="eCalcAmt('${rid}',${i})"></div>
    <div class="field"><label>數量</label><input type="number" id="epur-qty-${rid}-${i}" oninput="eCalcAmt('${rid}',${i})"></div>
    <div class="field"><label>金額</label><input type="number" id="epur-amt-${rid}-${i}" style="background:rgba(244,121,32,0.06);color:var(--orange);" readonly></div>
    <div class="field purchase-supplier"><label>廠商</label><input type="text" id="epur-sup-${rid}-${i}"></div>
    <div class="field"><label>歸屬</label>
      <select id="epur-owner-${rid}-${i}" style="background:var(--white);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.5rem;font-size:0.85rem;font-family:'Noto Sans TC',sans-serif;">
        <option value="派西夫">派西夫</option><option value="智域">智域</option>
      </select>
    </div>
    <button class="btn-icon" onclick="eRemovePur('${rid}',${i})">✕</button>`;
  list.appendChild(div);
}
function eRemovePur(rid,i){ document.getElementById(`epur-row-${rid}-${i}`)?.remove(); }
function eAddInv(rid){
  const list=document.getElementById(`einv-list-${rid}`);
  const i=list.children.length;
  const div=document.createElement('div');
  div.className='purchase-row'; div.id=`einv-row-${rid}-${i}`;
  div.innerHTML=`
    <div class="field"><label>類別</label><input type="text" id="einv-cat-${rid}-${i}"></div>
    <div class="field"><label>品項</label><input type="text" id="einv-item-${rid}-${i}"></div>
    <div class="field"><label>數量</label><input type="text" id="einv-qty-${rid}-${i}"></div>
    <div class="field purchase-unit"><label>單位</label><input type="text" id="einv-unit-${rid}-${i}"></div>
    <div class="field purchase-supplier"><label>備註</label><input type="text" id="einv-note-${rid}-${i}"></div>
    <button class="btn-icon" onclick="eRemoveInv('${rid}',${i})">✕</button>`;
  list.appendChild(div);
}
function eRemoveInv(rid,i){ document.getElementById(`einv-row-${rid}-${i}`)?.remove(); }

function startEdit(date){ editingId=date; renderRecords(allRecords); }
function cancelEdit(){ editingId=null; renderRecords(allRecords); }

async function saveRecord(date) {
  const rid = date;
  const purList = document.getElementById(`epur-list-${rid}`);
  const purchases = Array.from(purList?.children||[]).map((row,i)=>({
    item:     document.querySelector(`[id="epur-item-${rid}-${i}"]`)?.value||'',
    price:    parseFloat(document.querySelector(`[id="epur-price-${rid}-${i}"]`)?.value)||0,
    qty:      parseFloat(document.querySelector(`[id="epur-qty-${rid}-${i}"]`)?.value)||0,
    amount:   parseFloat(document.querySelector(`[id="epur-amt-${rid}-${i}"]`)?.value)||0,
    supplier: document.querySelector(`[id="epur-sup-${rid}-${i}"]`)?.value||'',
    owner:    document.querySelector(`[id="epur-owner-${rid}-${i}"]`)?.value||'派西夫',
  })).filter(p=>p.item);
  const invList = document.querySelector(`[id="einv-list-${rid}"]`);
  const inventories = Array.from(invList?.children||[]).map((row,i)=>({
    category: document.querySelector(`[id="einv-cat-${rid}-${i}"]`)?.value||'',
    item:     document.querySelector(`[id="einv-item-${rid}-${i}"]`)?.value||'',
    qty:      document.querySelector(`[id="einv-qty-${rid}-${i}"]`)?.value||'',
    unit:     document.querySelector(`[id="einv-unit-${rid}-${i}"]`)?.value||'',
    note:     document.querySelector(`[id="einv-note-${rid}-${i}"]`)?.value||'',
  })).filter(p=>p.item);
  const g = eid => { try{ return parseFloat(document.querySelector(`[id="e-${eid}-${rid}"]`)?.value)||0; }catch(e){return 0;} };
  const record = {
    cashActual:     g('rev-cashactual'),
    overflow:       g('rev-overflow'),
    storeUsed:      g('store-used'),
    storeValue:     g('store-value'),
    pettyIncome:    g('fin-pettyincome'),
    expensePassive: g('fin-exppassive'),
    expenseIqrator: g('fin-expiqrator'),
    expense:        g('fin-exppassive')+g('fin-expiqrator'),
    deposit:        g('fin-deposit'),
    pettyCash:      g('fin-pettycash'),
    notes:          document.querySelector(`[id="e-notes-${rid}"]`)?.value||'',
  };
  const res = await API.saveRecord(date, record, purchases, inventories);
  if (res.isSuccess) { editingId=null; await loadRecords(); }
  else { alert('儲存失敗：'+res.message); }
}

async function deleteRecord(date) {
  if (!confirm(`確定要刪除 ${formatDate(date)} 的記錄嗎？`)) return;
  const res = await API.deleteRecord(date);
  if (res.isSuccess) { await loadRecords(); }
  else { alert('刪除失敗：'+res.message); }
}

function toggleNewForm() {
  document.getElementById('new-record-form').classList.toggle('show');
}
async function adminAddRecord() {
  const status = document.getElementById('new-record-status');
  const date   = document.getElementById('new-date').value;
  if (!date) { showStatus(status,'❌ 請選擇日期','error'); return; }
  const record = {
    cashActual:     parseFloat(document.getElementById('new-cash').value)||0,
    deposit:        parseFloat(document.getElementById('new-deposit').value)||0,
    expensePassive: parseFloat(document.getElementById('new-expense').value)||0,
    expenseIqrator: 0, expense: parseFloat(document.getElementById('new-expense').value)||0,
    pettyCash:      parseFloat(document.getElementById('new-petty').value)||0,
    pettyIncome:0, storeUsed:0, storeValue:0, overflow:0,
    notes: document.getElementById('new-notes').value,
  };
  const res = await API.saveRecord(date, record, [], []);
  if (res.isSuccess) {
    showStatus(status,'✅ 新增成功','success');
    toggleNewForm();
    await loadRecords();
  } else { showStatus(status,'❌ '+res.message,'error'); }
}
